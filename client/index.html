    <title>Muhammad Saykot — Full-Stack Developer</title>
    <script>
      // Apply the saved theme before paint to avoid a light/dark flash.
      (function () {
        try {
          var saved = localStorage.getItem('saykot-theme');
          var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'prodark' : 'prolight');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
